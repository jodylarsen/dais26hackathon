resources:
  jobs:
    ingest_pincode_api:
      name: "[virtue-health] Ingest India Post Pincode Lookup"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ../src/ingest_pincode_api.py
          # no cluster config = serverless

      schedule:
        quartz_cron_expression: "0 30 3 1 * ?"  # 1st of each month at 03:30 IST
        timezone_id: "Asia/Kolkata"
        pause_status: PAUSED

      tags:
        track: enrichment
        source: postalpincode
