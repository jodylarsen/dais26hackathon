resources:
  jobs:
    ingest_wikidata:
      name: "[virtue-health] Ingest Wikidata Indian Hospitals"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ../src/ingest_wikidata.py
          # no cluster config = serverless

      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"  # every Sunday at 03:00 IST
        timezone_id: "Asia/Kolkata"
        pause_status: PAUSED

      tags:
        track: enrichment
        source: wikidata
