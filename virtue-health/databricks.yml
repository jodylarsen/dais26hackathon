bundle:
  name: virtue-health

include:
  - resources/*.yml

sync:
  include:
    - dist/
    - client/dist/
    - src/
  exclude:
    - package-lock.json
    - package.json
    - appkit.plugins.json
    - tsconfig.json
    - tsconfig.client.json
    - tsconfig.server.json
    - tsconfig.shared.json
    - tsdown.server.config.ts
    - eslint.config.js
    - playwright.config.ts
    - vitest.config.ts
    - README.md
    - client/src/
    - client/vite.config.ts
    - server/
    - shared/
    - tests/
    - docs/
    - node_modules/

variables:
  warehouse_id:
    description: SQL Warehouse ID for analytics queries. Obtain from the workspace SQL Warehouses page.

resources:
  apps:
    app:
      name: "virtue-health"
      description: "Healthcare data explorer for DAIS 2026 — facilities, district health indicators, and pin codes"
      source_code_path: ./

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-db188da4-0821.cloud.databricks.com

    variables:
      warehouse_id: b9df2b203f0736b7
